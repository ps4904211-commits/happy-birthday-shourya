 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Meri Pyari Pari ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
z-index:2;
position:relative;
padding:20px;
}

h1{
font-size:40px;
color:white;
margin-bottom:10px;
animation:glow 2s infinite;
}

h2{
font-size:22px;
color:#ff5c8d;
margin-bottom:25px;
}

button{

padding:16px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff5c8d;
color:white;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.1);

}

@keyframes glow{

0%{
text-shadow:0 0 10px #ff5c8d;
}

50%{
text-shadow:0 0 35px #ff5c8d;
}

100%{
text-shadow:0 0 10px #ff5c8d;
}

}

.heart{

position:absolute;
color:#ff4d6d;
font-size:22px;
animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-100vh);
opacity:1;
}

100%{

transform:translateY(100vh);
opacity:0;

}

}
#line1,#line2{
margin-top:15px;
font-size:18px;
color:#ffd6e7;
animation:glow 2s infinite;
}
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:99999;
text-align:center;
cursor:pointer;
transition:0.8s;
}

#intro h1{
font-size:34px;
color:#ff7eb3;
}

#intro p{
margin-top:20px;
font-size:20px;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{opacity:.5;}
to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">
<div id="intro">
<h1>🌻 Happy Birthday Shourya 🌻</h1>
<p>❤️ Tap Anywhere To Begin ❤️</p>
</div>
<h1>🎂 Happy Birthday</h1>

<h2>❤️ Meri Pyari Pari ❤️</h2>

<button onclick="start()">Tap Here 💌</button>

</div>
<p id="line1">✨ Aaj ka din sirf tumhare liye hai ✨</p>

<p id="line2">
Tum meri sabse special person ho ❤️
</p>
<script>

function start(){

document.getElementById("line1").innerHTML="🎂 Happy Birthday Shourya 🎂";

document.getElementById("line2").innerHTML="❤️ I hope tumhari har wish puri ho... aur tum hamesha smile karte raho ❤️";

}

for(let i=0;i<35;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(3+Math.random()*5)+"s";

heart.style.fontSize=(15+Math.random()*30)+"px";

document.body.appendChild(heart);

}
document.getElementById("intro").addEventListener("click",function(){

document.getElementById("intro").style.opacity="0";

setTimeout(function(){

document.getElementById("intro").style.display="none";

if(typeof start==="function"){
start();
}

},800);

});
</script>

</body>
  </html>
